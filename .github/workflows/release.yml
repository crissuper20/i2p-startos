name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - arch: x86_64
            start_cli_arch: x86_64-linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools-ng

      - name: Install start-cli
        run: |
          CLI_VERSION="v0.4.0-alpha.22"
          curl -fsSL "https://github.com/Start9Labs/start-os/releases/download/${CLI_VERSION}/start-cli_${{ matrix.start_cli_arch }}" -o /usr/local/bin/start-cli
          chmod +x /usr/local/bin/start-cli
          start-cli --version

      - name: Initialize developer key
        run: |
          mkdir -p ~/.startos
          openssl genpkey -algorithm ed25519 -outform PEM -out ~/.startos/developer.key.pem
          chmod 444 ~/.startos/developer.key.pem
          echo "--- key after generation ---"
          xxd ~/.startos/developer.key.pem | head -3

      - name: Build s9pk
        run: |
          echo "--- key before build ---"
          xxd ~/.startos/developer.key.pem | head -3
          make ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: i2p_${{ matrix.arch }}.s9pk
          path: i2p_${{ matrix.arch }}.s9pk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.s9pk
          generate_release_notes: true
          prerelease: true
