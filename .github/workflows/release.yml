name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        arch: [x86_64, aarch64, riscv64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools-ng

      - name: Install start-cli
        run: |
          CLI_VERSION="v0.4.0-beta.7"
          curl -fsSL "https://github.com/Start9Labs/start-os/releases/download/${CLI_VERSION}/start-cli_x86_64-linux" -o /usr/local/bin/start-cli
          chmod +x /usr/local/bin/start-cli
          start-cli --version

      - name: Initialize developer key
        run: |
          mkdir -p ~/.startos
          openssl genpkey -algorithm ed25519 -outform PEM -out ~/.startos/developer.key.pem

      - name: Build s9pk
        run: make ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: i2p_${{ matrix.arch }}.s9pk
          path: i2p_${{ matrix.arch }}.s9pk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: artifacts/*.s9pk
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          make_latest: true
